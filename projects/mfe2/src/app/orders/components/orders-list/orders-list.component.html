<app-orders-sub-menu></app-orders-sub-menu>

<section class="orders-page">
  <h2>Orders</h2>

  <ng-container *ngIf="orders$ | async as orders">
    
    <!-- Empty state -->
    <div *ngIf="orders.length === 0" class="empty">
      No orders found.
    </div>

    <!-- Orders table -->
    <table *ngIf="orders.length > 0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Customer</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let order of orders">
          <td>{{ order.id }}</td>
          <td>{{ order.customer }}</td>
          <td>
            <span class="status" [ngClass]="order.status.toLowerCase()">
              {{ order.status }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>

  </ng-container>
</section>
